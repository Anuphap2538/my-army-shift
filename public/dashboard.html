<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คเวร | ภารกิจกองพัน & ศปก.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    <style>
        /* ------------------------------------------------------------------ */
        /* ✨ ส่วนพื้นหลังที่เพิ่มใหม่ (Glassmorphism Style) ✨ */
        /* ------------------------------------------------------------------ */
        :root { 
            --sun: #ef4444; --sat: #3b82f6; --holiday: #fb7185; 
            --work: #1e293b; --bg: #f1f5f9; 
            --glass: rgba(255, 255, 255, 0.7); /* ความใสของการ์ด */
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            margin: 0; padding: 12px; min-height: 100vh;
            /* ใส่รูปพื้นหลังเหมือนหน้า Import */
            background-image: linear-gradient(rgba(241, 245, 249, 0.4), rgba(241, 245, 249, 0.4)), url('images/pa.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }

        /* เอฟเฟกต์ Blur พื้นหลัง */
        body::before { 
            content: ""; position: fixed; inset: 0; background: inherit; 
            filter: blur(5px); z-index: -1; 
        }

        .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }

        /* ปรับการ์ดให้มีความใส (Glass Effect) */
        .card { 
            background: var(--glass) !important; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px; border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            margin-bottom: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* ปรับแต่งส่วนอื่นๆ ให้เข้ากับพื้นหลังใส */
        .grid { background: rgba(0,0,0,0.05) !important; gap: 6px; }
        .cell { background: rgba(255,255,255,0.5) !important; border: 1px solid rgba(255,255,255,0.2) !important; }
        .cell:hover { background: rgba(255,255,255,0.8) !important; }

        /* ------------------------------------------------------------------ */
        /* 🛑 ส่วนโค้ดเดิม (ห้ามเปลี่ยน) */
        /* ------------------------------------------------------------------ */
        h3 { font-size: 1.1rem; color: var(--work); display: flex; align-items: center; gap: 8px; }
        .day-label { text-align: center; font-size: 11px; font-weight: 700; color: #64748b; padding-bottom: 8px; }
        .day-label.sunday { color: var(--sun); }
        .day-label.saturday { color: var(--sat); }
        .num { font-size: 16px; font-weight: 700; color: #334155; }
        .sun-text { color: var(--sun); }
        .sat-text { color: var(--sat); }
        .duty-active { background: #4f46e5 !important; border-color: #4f46e5 !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }
        .duty-active .num { color: white !important; }
        .duty-dot { width: 6px; height: 6px; background: #f59e0b; border-radius: 50%; position: absolute; bottom: 8px; }
        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: flex-end; }
        .modal-content { background: #1e293b; color: white; width: 100%; border-radius: 24px 24px 0 0; padding: 24px; box-sizing: border-box; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .close-btn { font-size: 28px; color: #94a3b8; }
        .holiday-name { font-size: 8px; color: var(--holiday); text-align: center; margin-top: 2px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size: 1.1em; color: var(--work);">👤 เลือกชื่อเพื่อตรวจสอบเวร</h3>
        <select id="userSelector" onchange="saveAndRender()">
            <option value="">-- ค้นหาชื่อของท่าน --</option>
        </select>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
        <div style="padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; background: rgba(255,255,255,0.3);">มีนาคม 2569</div>
        <div class="grid" style="display: grid; grid-template-columns: repeat(7, 1fr);">
            <div class="day-label sunday">อา</div><div class="day-label">จ</div><div class="day-label">อ</div>
            <div class="day-label">พ</div><div class="day-label">พฤ</div><div class="day-label">ศ</div>
            <div class="day-label saturday">ส</div>
        </div>
        <div id="calendarGrid" class="grid"></div>
    </div>

    <div id="dutyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="displayDate" style="margin:0; font-size: 1.2em; color: white;"></h3>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="partnerList"></div>
            <div style="margin-top: 20px; text-align: center;">
                <button onclick="closeModal()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ส่วน Script เดิมทั้งหมด ห้ามลบหรือเปลี่ยน
    let scheduleData = {};
    let currentUserName = ""; 
    const YEAR = 2026;
    const MONTH = 2; 
    const holidays = { "2026-03-03": "วันมาฆบูชา", "2026-03-04": "วันหยุดชดเชยมาฆบูชา" };

    // ... (ก๊อปปี้ Logic สคริปต์ตัวเดิมของเพื่อนมาวางต่อตรงนี้จนจบได้เลย)
    async function init() {
        try {
            const res = await fetch('/api/my-profile');
            if (res.status === 401) {
                window.location.href = '/google/auth'; 
                return;
            }
            const userData = await res.json(); 
            currentUserName = userData.rank_name; 
            const cardHeader = document.querySelector('.card h3');
            if(cardHeader) cardHeader.innerHTML = `👤 กำลังใช้งาน: <span style="color:#2980b9">${currentUserName}</span>`;
            document.getElementById('userSelector').style.display = 'none';
            const sRes = await fetch('/get-my-duty');
            const myShifts = await sRes.json();
            scheduleData = {};
            myShifts.forEach(s => {
                const dateStr = s.shift_date.split('T')[0];
                if (!scheduleData[dateStr]) scheduleData[dateStr] = [];
                scheduleData[dateStr].push({ name: currentUserName, role: s.role_type });
            });
            renderCalendar();
        } catch(e) { console.error("Init Error:", e); }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const selectedUser = currentUserName;
        grid.innerHTML = '';
        const firstDay = new Date(YEAR, MONTH, 1).getDay();
        const daysInMonth = new Date(YEAR, MONTH + 1, 0).getDate();
        for (let x = 0; x < firstDay; x++) {
            const empty = document.createElement('div');
            empty.className = 'cell';
            grid.appendChild(empty);
        }
        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${YEAR}-${String(MONTH + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const dayOfWeek = new Date(YEAR, MONTH, i).getDay();
            const holidayName = holidays[dateStr];
            const cell = document.createElement('div');
            cell.className = 'cell';
            let colorClass = "num";
            if(dayOfWeek === 0 || holidayName) colorClass = "num sun-text";
            else if(dayOfWeek === 6) colorClass = "num sat-text";
            cell.innerHTML = `<span class="${colorClass}">${i}</span>${holidayName ? `<span class="holiday-name">${holidayName}</span>` : ''}`;
            const duties = scheduleData[dateStr] || [];
            const isMe = duties.some(d => d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, ''));
            if (isMe) { cell.classList.add('duty-active'); }
            else if (duties.length > 0) {
                const dot = document.createElement('div');
                dot.className = 'duty-dot';
                cell.appendChild(dot);
            }
            cell.onclick = () => showInfo(i, dateStr, holidayName, duties);
            grid.appendChild(cell);
        }
    }

    function showInfo(day, dateStr, holidayName, duties) {
        const modal = document.getElementById('dutyModal');
        const list = document.getElementById('partnerList');
        const selectedUser = currentUserName;
        const myDuties = duties.filter(d => d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, ''));
        if (myDuties.length === 0) return; 
        modal.style.display = 'flex';
        document.getElementById('displayDate').innerText = `วันที่ ${day} มีนาคม 2569 ${holidayName ? '('+holidayName+')' : ''}`;
        const orderKongPan = ["นายทหารเวรกองพัน", "จ่าเวรร้อย สนน.", "จ่าเวรร้อย รก.", "จ่าเวรร้อย ทย.", "จ่าเวรร้อย ตอ.", "จ่าเวรหน่วยฝึกทหารใหม่", "จ่าเวร มว.สุนัขทหาร", "จ่าเวร ขส.", "จ่าเวรสูทกรรม"];
        const orderSPK = ["นายทหารเวร ศปก.", "เวรวิทยุ ผลัด 1", "เวรวิทยุ ผลัด 2", "เวรวิทยุ ผลัด 3", "เวร สยย.", "เวร ชป.", "เวรสายตรวจสุนัขทหาร"];
        const amIKongPan = myDuties.some(d => orderKongPan.some(role => d.role.includes(role)));
        const amISPK = myDuties.some(d => orderSPK.some(role => d.role.includes(role)));
        let showKP = true, showSPK = true;
        if (amIKongPan && !amISPK) showSPK = false; 
        if (amISPK && !amIKongPan) showKP = false;
        let gridStyle = (showKP && showSPK) ? "grid-template-columns: 1fr 1fr;" : "grid-template-columns: 1fr;";
        let html = `<div style="display: grid; ${gridStyle} gap: 20px;">`;
        const findDuty = (roleName) => duties.find(d => d.role.replace(/\s+/g, '').includes(roleName.replace(/\s+/g, '')));
        if (showKP) {
            html += `<div><h4 style="color:#f1c40f; border-bottom:2px solid rgba(241, 196, 15, 0.3); margin: 0 0 15px 0; padding-bottom: 5px; font-size:1.3em; font-weight:bold;">🛡️ เวรกองพัน</h4>`;
            orderKongPan.forEach(role => {
                const d = findDuty(role);
                const isMeLine = d && d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, '');
                html += `<div style="margin-bottom:12px;"><span style="font-size:0.85em; color:#bbb; display:block; margin-bottom: 2px;">${role}</span><span style="font-size:1.1em; ${isMeLine ? 'color:#f1c40f; font-weight:bold; border-bottom: 2px solid;' : 'color:#fff;'}">${d ? d.name : '-'}</span></div>`;
            });
            html += `</div>`;
        }
        if (showSPK) {
            html += `<div><h4 style="color:#3498db; border-bottom:2px solid rgba(52, 152, 219, 0.3); margin: 0 0 15px 0; padding-bottom: 5px; font-size:1.3em; font-weight:bold;">📡 เวร ศปก.</h4>`;
            orderSPK.forEach(role => {
                const d = findDuty(role);
                const isMeLine = d && d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, '');
                html += `<div style="margin-bottom:12px;"><span style="font-size:0.85em; color:#bbb; display:block; margin-bottom: 2px;">${role}</span><span style="font-size:1.1em; ${isMeLine ? 'color:#f1c40f; font-weight:bold; border-bottom: 2px solid;' : 'color:#fff;'}">${d ? d.name : '-'}</span></div>`;
            });
            html += `</div>`;
        }
        html += `</div>`;
        list.innerHTML = html;
    }
    function closeModal() { document.getElementById('dutyModal').style.display = 'none'; }
    window.onclick = function(event) { if (event.target == document.getElementById('dutyModal')) closeModal(); }
    init();
</script>
</body>
</html>
