<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คเวร | ภารกิจกองพัน & ศปก.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    <style>
        :root { 
            --sun: #ef4444; --sat: #3b82f6; --holiday: #fb7185; 
            --work: #1e293b; --bg: #f1f5f9; 
            --glass: rgba(255, 255, 255, 0.7);
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            margin: 0; padding: 12px; min-height: 100vh;
            background-image: linear-gradient(rgba(241, 245, 249, 0.4), rgba(241, 245, 249, 0.4)), url('images/pa.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }

        body::before { 
            content: ""; position: fixed; inset: 0; background: inherit; 
            filter: blur(5px); z-index: -1; 
        }

        .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }

        .card { 
            background: var(--glass) !important; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            margin-bottom: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .user-profile { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .user-icon { width: 45px; height: 45px; background: #4f46e5; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .user-info { text-align: left; }
        .user-label { font-size: 12px; color: #64748b; margin: 0; }
        .user-name { font-size: 1.1rem; font-weight: 700; color: var(--work); margin: 0; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; background: rgba(0,0,0,0.05); }
        .day-label { text-align: center; font-size: 11px; font-weight: 700; color: #64748b; padding: 8px 0; }
        .day-label.sunday { color: var(--sun); }
        .day-label.saturday { color: var(--sat); }

        .cell { 
            background: rgba(255,255,255,0.6) !important; aspect-ratio: 1/1.3; 
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-start; padding-top: 6px; position: relative;
        }

        .num { font-size: 16px; font-weight: 700; color: #334155; }
        .sun-text { color: var(--sun); }
        .sat-text { color: var(--sat); }

        .duty-active { 
            background: #4f46e5 !important; border-color: #4f46e5 !important; 
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); 
        }
        .duty-active .num { color: white !important; }
        .duty-dot { width: 6px; height: 6px; background: #f59e0b; border-radius: 50%; position: absolute; bottom: 8px; }

        .modal { 
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            align-items: flex-end; 
        }

        .modal-content { 
            background: #1e293b; color: white; width: 100%; 
            border-radius: 24px 24px 0 0; padding: 24px;
            box-sizing: border-box; animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-btn { font-size: 28px; color: #94a3b8; cursor: pointer; }
        .holiday-name { font-size: 8px; color: var(--holiday); text-align: center; margin-top: 2px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="user-profile">
            <div class="user-icon"><i class="fas fa-user-shield"></i></div>
            <div class="user-info">
                <p class="user-label">ข้อมูลเวรของท่าน</p>
                <p id="userNameDisplay" class="user-name">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
        <div style="padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; background: rgba(255,255,255,0.2);">มีนาคม 2569</div>
        <div class="grid">
            <div class="day-label sunday">อา</div><div class="day-label">จ</div><div class="day-label">อ</div>
            <div class="day-label">พ</div><div class="day-label">พฤ</div><div class="day-label">ศ</div>
            <div class="day-label saturday">ส</div>
        </div>
        <div id="calendarGrid" class="grid"></div>
    </div>

    <div id="dutyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3 id="displayDate" style="margin:0; font-size: 1.2em; color: white;"></h3>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="partnerList"></div>
            <div style="margin-top: 25px; text-align: center;">
                <button onclick="closeModal()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 12px 24px; border-radius: 12px; cursor: pointer; width: 100%;">ตกลง</button>
            </div>
        </div>
    </div>
</div>

<script>
    let scheduleData = {};
    let currentUserName = ""; 
    const YEAR = 2026;
    const MONTH = 2; 
    const holidays = { "2026-03-03": "วันมาฆบูชา", "2026-03-04": "วันหยุดชดเชยมาฆบูชา" };

    async function init() {
        try {
            // 1. ดึง Profile
            const res = await fetch('/api/my-profile');
            if (res.status === 401) {
                window.location.href = '/google/auth'; 
                return;
            }
            const userData = await res.json(); 
            currentUserName = userData.rank_name; 
            document.getElementById('userNameDisplay').innerText = currentUserName;

            // 2. ดึงรายการเวร
            const sRes = await fetch('/get-my-duty');
            const myShifts = await sRes.json();
            
            // --- เริ่มต้นส่วนที่มึงถาม (วางทับตรงนี้) ---
            scheduleData = {};
            myShifts.forEach(s => {
    const d = new Date(s.shift_date);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    
    if (!scheduleData[dateStr]) scheduleData[dateStr] = [];
    
    scheduleData[dateStr].push({ 
        name: s.rank_name, // ตอนนี้ s.rank_name จะมีค่าแล้วเพราะเราแก้ SQL JOIN มา
        role: s.role_type 
    });
});
            // --- สิ้นสุดส่วนที่วางทับ ---

            renderCalendar();
        } catch(e) { 
            console.error("Init Error:", e); 
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const selectedUser = currentUserName; 
        grid.innerHTML = '';

        const firstDay = new Date(YEAR, MONTH, 1).getDay();
        const daysInMonth = new Date(YEAR, MONTH + 1, 0).getDate();

        for (let x = 0; x < firstDay; x++) {
            const empty = document.createElement('div');
            empty.className = 'cell';
            grid.appendChild(empty);
        }

        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${YEAR}-${String(MONTH + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const dayOfWeek = new Date(YEAR, MONTH, i).getDay();
            const holidayName = holidays[dateStr];

            const cell = document.createElement('div');
            cell.className = 'cell';

            let colorClass = "num";
            if(dayOfWeek === 0 || holidayName) colorClass = "num sun-text";
            else if(dayOfWeek === 6) colorClass = "num sat-text";

            cell.innerHTML = `<span class="${colorClass}">${i}</span>${holidayName ? `<span class="holiday-name">${holidayName}</span>` : ''}`;

            const duties = scheduleData[dateStr] || [];
            const isMe = duties.some(d => d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, ''));

            if (isMe) {
                cell.classList.add('duty-active');
            } else if (duties.length > 0) {
                const dot = document.createElement('div');
                dot.className = 'duty-dot';
                cell.appendChild(dot);
            }

            cell.onclick = () => showInfo(i, dateStr, holidayName, duties);
            grid.appendChild(cell);
        }
    }

    function showInfo(day, dateStr, holidayName, duties) {
        const modal = document.getElementById('dutyModal');
        const list = document.getElementById('partnerList');
        const selectedUser = currentUserName;

        const myDuties = duties.filter(d => d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, ''));
        if (myDuties.length === 0) return; 
        
        modal.style.display = 'flex';
        document.getElementById('displayDate').innerText = `วันที่ ${day} มีนาคม 2569 ${holidayName ? '('+holidayName+')' : ''}`;

        const orderKongPan = ["นายทหารเวรกองพัน", "จ่าเวรร้อย สนน.", "จ่าเวรร้อย รก.", "จ่าเวรร้อย ทย.", "จ่าเวรร้อย ตอ.", "จ่าเวรหน่วยฝึกทหารใหม่", "จ่าเวร มว.สุนัขทหาร", "จ่าเวร ขส.", "จ่าเวรสูทกรรม"];
        const orderSPK = ["นายทหารเวร ศปก.", "เวรวิทยุ ผลัด 1", "เวรวิทยุ ผลัด 2", "เวรวิทยุ ผลัด 3", "เวร สยย.", "เวร ชป.", "เวรสายตรวจสุนัขทหาร"];

        const amIKongPan = myDuties.some(d => orderKongPan.some(role => d.role.includes(role)));
        const amISPK = myDuties.some(d => orderSPK.some(role => d.role.includes(role)));

        let showKP = true, showSPK = true;
        if (amIKongPan && !amISPK) showSPK = false; 
        if (amISPK && !amIKongPan) showKP = false;

        let gridStyle = (showKP && showSPK) ? "grid-template-columns: 1fr 1fr;" : "grid-template-columns: 1fr;";
        let html = `<div style="display: grid; ${gridStyle} gap: 20px;">`;
        
        const findDuty = (roleName) => duties.find(d => d.role.replace(/\s+/g, '').includes(roleName.replace(/\s+/g, '')));

        if (showKP) {
            html += `<div><h4 style="color:#f1c40f; border-bottom:2px solid rgba(241, 196, 15, 0.3); margin: 0 0 15px 0; padding-bottom: 5px; font-size:1.1em;">🛡️ กองพัน</h4>`;
            orderKongPan.forEach(role => {
                const d = findDuty(role);
                const isMeLine = d && d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, '');
                html += `<div style="margin-bottom:12px;">
                            <span style="font-size:0.8em; color:#94a3b8; display:block;">${role}</span>
                            <span style="font-size:1em; ${isMeLine ? 'color:#f1c40f; font-weight:bold;' : 'color:#fff;'}">${d ? d.name : '-'}</span>
                         </div>`;
            });
            html += `</div>`;
        }

        if (showSPK) {
            html += `<div><h4 style="color:#3b82f6; border-bottom:2px solid rgba(59, 130, 246, 0.3); margin: 0 0 15px 0; padding-bottom: 5px; font-size:1.1em;">📡 ศปก.</h4>`;
            orderSPK.forEach(role => {
                const d = findDuty(role);
                const isMeLine = d && d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, '');
                html += `<div style="margin-bottom:12px;">
                            <span style="font-size:0.8em; color:#94a3b8; display:block;">${role}</span>
                            <span style="font-size:1em; ${isMeLine ? 'color:#f1c40f; font-weight:bold;' : 'color:#fff;'}">${d ? d.name : '-'}</span>
                         </div>`;
            });
            html += `</div>`;
        }
        html += `</div>`;
        list.innerHTML = html;
    }

    function closeModal() { document.getElementById('dutyModal').style.display = 'none'; }
    window.onclick = function(event) { if (event.target == document.getElementById('dutyModal')) closeModal(); }
    init();
</script>
</body>
</html>
