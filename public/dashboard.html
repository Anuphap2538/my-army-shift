<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คเวร | ภารกิจกองพัน & ศปก.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --sun: #e74c3c; --sat: #2980b9; --holiday: #ff7675; --work: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 550px; margin: auto; }
        
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 15px; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #eee; font-size: 16px; outline: none; appearance: none; background: url('data:image/svg+xml;charset=US-ASCII,<svg%20xmlns%3D"http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg"%20width%3D"24"%20height%3D"24"%20viewBox%3D"0%200%2024%2024"><path%20fill%3D"%23333"%20d%3D"M7%2010l5%205%205-5z"%2F><%2Fsvg>') no-repeat right 10px center; background-color: white; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #eee; }
        .day-label { background: #34495e; color: white; padding: 10px 0; text-align: center; font-size: 12px; font-weight: bold; }
        .day-label.sunday { background: var(--sun); }
        .day-label.saturday { background: var(--sat); }

        .cell { background: white; aspect-ratio: 1/1.1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 5px; position: relative; cursor: pointer; transition: 0.2s; }
        .cell:hover { background: #f1f2f6; }
        
        .num { font-size: 18px; font-weight: bold; }
        .sun-text { color: var(--sun); }
        .sat-text { color: var(--sat); }
        .holiday-name { font-size: 8px; color: var(--holiday); text-align: center; margin-top: 2px; font-weight: bold; }

        .duty-active { background: var(--sun) !important; color: white !important; border-radius: 8px; transform: scale(0.95); box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
        .duty-active .num, .duty-active .sun-text, .duty-active .sat-text, .duty-active .holiday-name { color: white !important; }
        .duty-dot { width: 6px; height: 6px; background: #f39c12; border-radius: 50%; position: absolute; bottom: 5px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal-content { background: #2c3e50; color: white; padding: 25px; border-radius: 24px; width: 90%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; }
        .close-btn { font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        .close-btn:hover { color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size: 1.1em; color: var(--work);">👤 เลือกชื่อเพื่อตรวจสอบเวร</h3>
        <select id="userSelector" onchange="saveAndRender()">
            <option value="">-- ค้นหาชื่อของท่าน --</option>
        </select>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
        <div style="padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; background: white;">มีนาคม 2569</div>
        <div class="grid">
            <div class="day-label sunday">อา</div><div class="day-label">จ</div><div class="day-label">อ</div>
            <div class="day-label">พ</div><div class="day-label">พฤ</div><div class="day-label">ศ</div>
            <div class="day-label saturday">ส</div>
        </div>
        <div id="calendarGrid" class="grid"></div>
    </div>

    <div id="dutyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="displayDate" style="margin:0; font-size: 1.2em;"></h3>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="partnerList"></div>
            <div style="margin-top: 20px; text-align: center;">
                <button onclick="closeModal()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>
</div>

<script>
    let scheduleData = {};
    const YEAR = 2026;
    const MONTH = 2; 
    const holidays = { "2026-03-03": "วันมาฆบูชา", "2026-03-04": "วันหยุดชดเชยมาฆบูชา" };

    async function init() {
        try {
            const [uRes, sRes] = await Promise.all([
                fetch('/get-users'),
                fetch('/get-dashboard-full')
            ]);
            const users = await uRes.json();
            scheduleData = await sRes.json();

            const selector = document.getElementById('userSelector');
            selector.innerHTML = '<option value="">-- ค้นหาชื่อของท่าน --</option>';
            users.sort((a,b) => a.rank_name.localeCompare(b.rank_name)).forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.rank_name;
                opt.innerText = u.rank_name;
                selector.appendChild(opt);
            });

            const saved = localStorage.getItem('rememberedName');
            if(saved) selector.value = saved;
            renderCalendar();
        } catch(e) { console.error("Init Error:", e); }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const selectedUser = document.getElementById('userSelector').value;
        grid.innerHTML = '';

        const firstDay = new Date(YEAR, MONTH, 1).getDay();
        const daysInMonth = new Date(YEAR, MONTH + 1, 0).getDate();

        for (let x = 0; x < firstDay; x++) {
            const empty = document.createElement('div');
            empty.className = 'cell';
            empty.style.background = '#f9f9f9';
            grid.appendChild(empty);
        }

        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${YEAR}-${String(MONTH + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const dayOfWeek = new Date(YEAR, MONTH, i).getDay();
            const holidayName = holidays[dateStr];

            const cell = document.createElement('div');
            cell.className = 'cell';

            let colorClass = "num";
            if(dayOfWeek === 0 || holidayName) colorClass = "num sun-text";
            else if(dayOfWeek === 6) colorClass = "num sat-text";

            cell.innerHTML = `<span class="${colorClass}">${i}</span>${holidayName ? `<span class="holiday-name">${holidayName}</span>` : ''}`;

            const duties = scheduleData[dateStr] || [];
            const isMe = duties.some(d => d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, ''));

            if (selectedUser && isMe) {
                cell.classList.add('duty-active');
            } else if (duties.length > 0) {
                const dot = document.createElement('div');
                dot.className = 'duty-dot';
                cell.appendChild(dot);
            }

            cell.onclick = () => showInfo(i, dateStr, holidayName, duties);
            grid.appendChild(cell);
        }
    }

    function showInfo(day, dateStr, holidayName, duties) {
        const modal = document.getElementById('dutyModal');
        const list = document.getElementById('partnerList');
        const selectedUser = document.getElementById('userSelector').value;

        if(!selectedUser) { alert("⚠️ กรุณาเลือกชื่อของท่านก่อนครับ"); return; }

        // 🔍 1. เช็คก่อนเลยว่า วันนี้มีชื่อเราเข้าเวรไหม?
        const myDuties = duties.filter(d => d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, ''));
        
        // 🛑 ถ้าไม่มีชื่อเราในวันนี้ ให้จบการทำงานทันที (ไม่โชว์ Pop-up)
        if (myDuties.length === 0) {
            return; 
        }
        
        // 2. ถ้ามีชื่อเรา ให้ทำงานต่อ... แสดง Modal
        modal.style.display = 'flex';
        document.getElementById('displayDate').innerText = `วันที่ ${day} มีนาคม 2569 ${holidayName ? '('+holidayName+')' : ''}`;

        const orderKongPan = ["นายทหารเวรกองพัน", "จ่าเวรร้อย สนน.", "จ่าเวรร้อย รก.", "จ่าเวรร้อย ทย.", "จ่าเวรร้อย ตอ.", "จ่าเวรหน่วยฝึกทหารใหม่", "จ่าเวร มว.สุนัขทหาร", "จ่าเวร ขส.", "จ่าเวรสูทกรรม"];
        const orderSPK = ["นายทหารเวร ศปก.", "เวรวิทยุ ผลัด 1", "เวรวิทยุ ผลัด 2", "เวรวิทยุ ผลัด 3", "เวร สยย.", "เวร ชป.", "เวรสายตรวจสุนัขทหาร"];

        // 3. เช็คกลุ่มสังกัดเพื่อเลือกแสดงตาราง
        const amIKongPan = myDuties.some(d => orderKongPan.some(role => d.role.includes(role)));
        const amISPK = myDuties.some(d => orderSPK.some(role => d.role.includes(role)));

        let showKP = true, showSPK = true;
        if (amIKongPan && !amISPK) showSPK = false; 
        if (amISPK && !amIKongPan) showKP = false;

        let gridStyle = (showKP && showSPK) ? "grid-template-columns: 1fr 1fr;" : "grid-template-columns: 1fr;";
        let html = `<div style="display: grid; ${gridStyle} gap: 20px;">`;
        
        const findDuty = (roleName) => duties.find(d => d.role.replace(/\s+/g, '').includes(roleName.replace(/\s+/g, '')));

        // --- ตารางกองพัน ---
    // --- ตารางกองพัน ---
if (showKP) {
    html += `<div><h4 style="color:#f1c40f; border-bottom:2px solid rgba(241, 196, 15, 0.3); margin: 0 0 15px 0; padding-bottom: 5px; font-size:1.3em; font-weight:bold;">🛡️ เวรกองพัน</h4>`;
    
    orderKongPan.forEach(role => {
        const d = findDuty(role);
        const isMeLine = d && d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, '');
        // ✅ เพิ่ม margin-bottom เป็น 12px ให้ไม่เบียดกัน และปรับฟอนต์หน้าที่เป็น 0.85em
        html += `<div style="margin-bottom:12px;">
                    <span style="font-size:0.85em; color:#bbb; display:block; margin-bottom: 2px;">${role}</span>
                    <span style="font-size:1.1em; ${isMeLine ? 'color:#f1c40f; font-weight:bold; border-bottom: 2px solid;' : 'color:#fff;'}">${d ? d.name : '-'}</span>
                 </div>`;
    });
    html += `</div>`;
}

// --- ตาราง ศปก. ---
if (showSPK) {
    html += `<div><h4 style="color:#3498db; border-bottom:2px solid rgba(52, 152, 219, 0.3); margin: 0 0 15px 0; padding-bottom: 5px; font-size:1.3em; font-weight:bold;">📡 เวร ศปก.</h4>`;
    
    orderSPK.forEach(role => {
        const d = findDuty(role);
        const isMeLine = d && d.name.replace(/\s+/g, '') === selectedUser.replace(/\s+/g, '');
        // ✅ เพิ่ม margin-bottom เป็น 12px และสีชื่อคนทั่วไปให้ขาวชัดขึ้น
        html += `<div style="margin-bottom:12px;">
                    <span style="font-size:0.85em; color:#bbb; display:block; margin-bottom: 2px;">${role}</span>
                    <span style="font-size:1.1em; ${isMeLine ? 'color:#f1c40f; font-weight:bold; border-bottom: 2px solid;' : 'color:#fff;'}">${d ? d.name : '-'}</span>
                 </div>`;
    });
    html += `</div>`;
}
        html += `</div>`;
        list.innerHTML = html;
    }

    function closeModal() { document.getElementById('dutyModal').style.display = 'none'; }
    
    window.onclick = function(event) {
        const modal = document.getElementById('dutyModal');
        if (event.target == modal) closeModal();
    }

    function saveAndRender() {
        localStorage.setItem('rememberedName', document.getElementById('userSelector').value);
        renderCalendar();
    }

    init();
</script>
</body>
</html>
