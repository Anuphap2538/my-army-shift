<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duty Dashboard | ระบบสรุปเวรทันสมัย</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Sarabun', 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.05) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, rgba(16, 185, 129, 0.05) 0, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* --- ส่วนที่เพิ่มใหม่: Import Container (รูปที่ 1) --- */
        .import-section {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .file-group { flex: 2; }
        .file-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--primary); font-size: 14px; }
        .input-excel { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: white; }
        
        .btn-send-calendar {
            flex: 1;
            background: var(--primary);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn-send-calendar:hover { background: var(--primary-hover); transform: translateY(-2px); }

        /* --- CSS เดิมของเพื่อน --- */
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 30px auto; }
        .title-area h1 { margin: 0; font-size: 28px; font-weight: 700; color: var(--primary); }
        .title-area p { margin: 5px 0 0 0; color: var(--text-sub); }

        .toolbar {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid white;
            margin-bottom: 30px;
            align-items: center;
            max-width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        select, .btn { padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); font-family: inherit; font-weight: 600; transition: all 0.2s; cursor: pointer; font-size: 14px; }
        .btn-group-primary { background: var(--primary); color: white; border: none; }
        .btn-group-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-outline { background: white; color: var(--text-main); }
        .btn-outline:hover { background: #f1f5f9; }

        .calendar-container { max-width: 1200px; margin: 0 auto; background: var(--card-bg); border-radius: 24px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid white; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border); }
        .weekday { background: #f1f5f9; padding: 15px; text-align: center; font-weight: 700; font-size: 13px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
        .day-cell { min-height: 140px; padding: 12px; background: white; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transition: 0.3s; position: relative; cursor: pointer; }
        .day-cell:hover { background: #fdfdfd; z-index: 10; transform: scale(1.01); box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .date-number { font-size: 18px; font-weight: 700; color: #cbd5e1; transition: 0.2s; }
        .day-cell:hover .date-number { color: var(--primary); }

        .badge-container { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        .badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .badge-boss { background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe; }
        .badge-count { background: #f8fafc; color: #64748b; font-size: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 24px; overflow: hidden; animation: zoomIn 0.3s ease-out; }
        .modal-header { background: var(--primary); color: white; padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; max-height: 450px; overflow-y: auto; }
        .duty-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--border); background: #fff; }

        /* --- ส่วนที่เพิ่มใหม่: Print Control (รูปที่ 2) --- */
        @media print {
            .header-container, .toolbar, .import-section, .calendar-container, .modal, #syncBtn, button, select { 
                display: none !important; 
            }
            #printTable { 
                display: table !important; 
                width: 100% !important; 
                border-collapse: collapse !important; 
                margin-top: 20px;
            }
            #printTable th, #printTable td { 
                border: 1px solid black !important; 
                padding: 12px !important; 
                text-align: left !important; 
                color: black !important;
            }
            .print-header { display: block !important; text-align: center; }
            body { background: white !important; padding: 0 !important; }
        }

        #printTable { display: none; }
    </style>
</head>
<body>

<div class="header-container no-print">
    <div class="title-area">
        <h1>Duty Dashboard</h1>
        <p id="subtext">ระบบบริหารจัดการและสรุปยอดเวรรายเดือน</p>
    </div>
</div>

<div class="import-section no-print">
    <div class="file-group">
        <label>📁 นำเข้าไฟล์ Excel รายชื่อทหาร</label>
        <input type="file" id="excelInputReport" class="input-excel" accept=".xlsx, .xls">
    </div>
    <button onclick="handleExcelImport()" class="btn-send-calendar">
        🚀 ส่งข้อมูลไป Calendar
    </button>
</div>

<div class="toolbar no-print">
    <select id="monthSelect" onchange="renderReport(currentGroup)">
        <option value="3">มีนาคม</option>
        <option value="4">เมษายน</option>
    </select>
    <button class="btn btn-group-primary" onclick="renderReport('กองพัน')">🔵 เวรกองพัน</button>
    <button class="btn btn-group-primary" style="background:#10b981" onclick="renderReport('ศปก.')">🟢 เวร ศปก.</button>
    <button class="btn btn-outline" onclick="window.print()">🖨️ ปริ้นท์รายงาน</button>
    <button class="btn btn-outline" style="color:#059669" onclick="exportToExcel()">📥 Excel</button>
</div>

<div class="calendar-container no-print">
    <div class="calendar-grid">
        <div class="weekday">อาทิตย์</div><div class="weekday">จันทร์</div><div class="weekday">อังคาร</div>
        <div class="weekday">พุธ</div><div class="weekday">พฤหัสบดี</div><div class="weekday">ศุกร์</div>
        <div class="weekday">เสาร์</div>
    </div>
    <div class="calendar-grid" id="calendarBody"></div>
</div>

<div class="print-header" style="display:none;">
    <h2 id="printTitle" style="margin-bottom: 5px;">สรุปตารางเวร</h2>
    <p id="printMonth" style="margin-top: 0;">ประจำเดือน มีนาคม 2569</p>
</div>
<table id="printTable">
    <thead>
        <tr>
            <th style="width: 40%;">ยศ ชื่อ - สกุล</th>
            <th style="width: 30%;">หน้าที่</th>
            <th style="width: 30%;">วันที่เข้าเวร</th>
        </tr>
    </thead>
    <tbody id="printTableBody"></tbody>
</table>

<div id="dutyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalDateTitle" style="margin:0">รายละเอียดการจัดเวร</h3>
            <span style="cursor:pointer; font-size:24px" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div style="padding:20px; border-top:1px solid #eee; text-align:right">
            <button class="btn btn-outline" onclick="closeModal()">ปิดหน้าต่าง</button>
        </div>
    </div>
</div>

<script>
    let currentGroup = 'กองพัน';
    let fullData = {};

    // ฟังก์ชันสำหรับจัดการการ Import (เพื่อนสามารถนำไปเชื่อมกับ Backend ได้เลย)
    async function handleExcelImport() {
        const fileInput = document.getElementById('excelInputReport');
        if (!fileInput.files.length) return alert("กรุณาเลือกไฟล์ Excel ก่อนครับเพื่อน!");
        
        alert("🔄 กำลังประมวลผลไฟล์และส่งข้อมูลไปยังระบบ...");
        // ใส่ Logic การ Fetch ไปยัง Server ตรงนี้
    }

    async function renderReport(group) {
        currentGroup = group;
        const month = document.getElementById('monthSelect').value;
        const monthName = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        
        document.getElementById('subtext').innerText = `กลุ่มงาน: ${group} | ประจำเดือน: ${monthName} 2569`;
        document.getElementById('printTitle').innerText = `สรุปตารางเวร (${group})`;
        document.getElementById('printMonth').innerText = `ประจำเดือน ${monthName} 2569`;

        try {
            const [resCal, resSum] = await Promise.all([
                fetch(`/get-report-calendar?month=${month}&year=2026&group=${group}`),
                fetch(`/get-excel-summary?month=${month}&year=2026&group=${group}`)
            ]);

            const dataCal = await resCal.json();
            const dataSum = await resSum.json();

            fullData = {};
            dataCal.forEach(item => {
                const day = new Date(item.shift_date).getDate();
                if (!fullData[day]) fullData[day] = [];
                fullData[day].push(item);
            });

            const firstDay = new Date(2026, month - 1, 1).getDay();
            const daysInMonth = new Date(2026, month, 0).getDate();
            const body = document.getElementById('calendarBody');
            body.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                body.innerHTML += `<div class="day-cell" style="background:#f8fafc"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                let badges = '';
                if (fullData[d]) {
                    const boss = fullData[d].find(x => x.role.includes("นายทหารเวร"));
                    if (boss) badges += `<div class="badge badge-boss">⭐ ${boss.rank_name}</div>`;
                    badges += `<div class="badge badge-count">👥 เข้าเวร ${fullData[d].length} นาย</div>`;
                }
                body.innerHTML += `
                    <div class="day-cell" onclick="openModal(${d})">
                        <span class="date-number">${d}</span>
                        <div class="badge-container">${badges}</div>
                    </div>
                `;
            }

            const printBody = document.getElementById('printTableBody');
            printBody.innerHTML = dataSum.map(row => `
                <tr><td>${row.rank_name}</td><td>${row.role}</td><td>${row.days}</td></tr>
            `).join('');
        } catch (e) { console.error(e); }
    }

    // ฟังก์ชัน Modal และอื่นๆ (คงเดิม)
    function openModal(day) {
        const body = document.getElementById('modalBody');
        const monthName = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        document.getElementById('modalDateTitle').innerText = `วันที่ ${day} ${monthName}`;
        if (!fullData[day]) {
            body.innerHTML = '<p style="text-align:center; color:#94a3b8">ไม่มีการจัดเวรในวันนี้</p>';
        } else {
            body.innerHTML = fullData[day].map(d => `
                <div class="duty-card">
                    <div>
                        <div style="font-weight:700;">${d.rank_name}</div>
                        <div style="font-size:13px; color:#64748b">${d.role}</div>
                    </div>
                    <button class="btn-del" onclick="deleteEntry(${d.id}, '${d.rank_name}', ${day})">ลบ</button>
                </div>
            `).join('');
        }
        document.getElementById('dutyModal').style.display = 'flex';
    }

    async function deleteEntry(id, name, day) {
        if (confirm(`ลบเวรของ ${name}?`)) {
            const res = await fetch(`/delete-shift/${id}`, { method: 'DELETE' });
            if (res.ok) { renderReport(currentGroup); closeModal(); }
        }
    }

    function closeModal() { document.getElementById('dutyModal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target.classList.contains('modal')) closeModal(); }

    async function exportToExcel() {
        const month = document.getElementById('monthSelect').value;
        const res = await fetch(`/get-excel-summary?month=${month}&year=2026&group=${currentGroup}`);
        const data = await res.json();
        const ws = XLSX.utils.json_to_sheet(data.map(r => ({ "ยศ ชื่อ-สกุล": r.rank_name, "หน้าที่": r.role, "วันที่": r.days })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "DutySummary");
        XLSX.writeFile(wb, `Duty_${currentGroup}.xlsx`);
    }

    renderReport('กองพัน');
</script>

</body>
</html>
