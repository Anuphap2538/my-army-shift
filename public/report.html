<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กองพันทหารอากาศโยธิน รร.การบิน Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --army-blue: #1e40af;
            --glass: rgba(255, 255, 255, 0.98);
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            background: #f1f5f9;
        }

        /* --- 🔴 แก้ไขส่วนหัว (วงสีแดง) ให้ใหญ่และชัดเจน --- */
        .top-navigation {
            max-width: 1400px; margin: 0 auto 30px auto;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass);
            padding: 30px 40px; border-radius: 30px; 
            border: 2px solid var(--primary); /* เน้นขอบให้ชัดตามวงแดง */
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.1);
        }

        .brand-area { display: flex; align-items: center; gap: 25px; }
        .logo-img { width: 80px; height: auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        
        /* เปลี่ยนชื่อและขยายขนาดตัวอักษร */
        .brand-text h1 { 
            margin: 0; font-size: 32px; color: var(--army-blue); font-weight: 800; 
            letter-spacing: -0.5px;
        }
        .brand-text p { margin: 5px 0 0 0; font-size: 16px; color: #64748b; font-weight: 500; }

        .controls-wrapper { display: flex; align-items: center; gap: 15px; }

        #monthSelect {
            padding: 12px 20px; width: 180px; border-radius: 15px; border: 2px solid #e2e8f0;
            font-family: inherit; font-weight: 700; font-size: 18px; cursor: pointer; color: var(--primary);
        }

        .btn-nav {
            padding: 14px 24px; border-radius: 15px; border: none;
            font-family: inherit; font-weight: 700; font-size: 16px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; gap: 10px;
        }
        .btn-kongpan { background: var(--danger) !important; color: white; }
        .btn-spk { background: var(--army-blue) !important; color: white; }
        .btn-sync-google { 
            background: var(--success) !important; color: white;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }
        .btn-nav:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }

        /* --- 📅 ปรับขนาดรายชื่อในปฏิทินให้ใหญ่ขึ้น --- */
        .calendar-container {
            max-width: 1400px; margin: 0 auto; background: white;
            border-radius: 35px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }
        .weekday { text-align: center; font-weight: 800; color: #475569; font-size: 18px; padding-bottom: 20px; }
        
        .day-cell {
            min-height: 150px; background: #fff; border-radius: 20px; padding: 15px;
            border: 1px solid #f1f5f9; transition: 0.2s; cursor: pointer;
            display: flex; flex-direction: column; box-shadow: inset 0 0 0 1px #f1f5f9;
        }
        .day-cell:hover { background: #f8fafc; border-color: var(--primary); }
        .date-number { font-size: 20px; font-weight: 800; color: #cbd5e1; margin-bottom: 10px; }
        
        /* ขยายขนาดชื่อทหารในหน้าปฏิทิน */
        .badge-boss { 
            font-size: 15px; color: var(--army-blue); font-weight: 700; 
            background: #eef2ff; padding: 8px 12px; border-radius: 10px; 
            margin-top: 5px; border: 1px solid #e0e7ff;
            display: block; width: 90%;
        }
        .badge-count { font-size: 13px; color: #94a3b8; margin-top: auto; font-weight: 600; }

        /* --- 🏠 หน้า PopUp (Modal) --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 500px; border-radius: 30px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { background: var(--army-blue); color: white; padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; max-height: 500px; overflow-y: auto; }
        
        .duty-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-bottom: 1px solid #f1f5f9; transition: 0.2s;
        }
        .duty-item:hover { background: #f8fafc; }
        .duty-item b { font-size: 18px; color: #1e293b; }
        
        /* 🔴 ปุ่มลบ ปรับเฉดสีเมื่อ Hover */
        .btn-del { 
            color: #94a3b8; background: #f1f5f9; border: none; padding: 10px 15px; 
            border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 14px;
        }
        .btn-del:hover { 
            color: white; background: var(--danger); /* เปลี่ยนเป็นสีแดง */
            transform: scale(1.1); box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 1024px) {
            .top-navigation { flex-direction: column; padding: 20px; }
            .controls-wrapper { flex-wrap: wrap; justify-content: center; width: 100%; }
            .brand-text h1 { font-size: 24px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="top-navigation no-print">
    <div class="brand-area">
        <img src="images/air.png" alt="Logo" class="logo-img"> 
        <div class="brand-text">
            <h1>กองพันทหารอากาศโยธิน รร.การบิน Dashboard</h1>
            <p id="subtext">ระบบบริหารจัดการและสรุปยอดกำลังพลเข้าเวรรายเดือน</p>
        </div>
    </div>

    <div class="controls-wrapper">
        <select id="monthSelect" onchange="renderReport(currentGroup)">
            <option value="1">มกราคม</option><option value="2">กุมภาพันธ์</option>
            <option value="3" selected>มีนาคม</option><option value="4">เมษายน</option>
            <option value="5">พฤษภาคม</option><option value="6">มิถุนายน</option>
            <option value="7">กรกฎาคม</option><option value="8">สิงหาคม</option>
            <option value="9">กันยายน</option><option value="10">ตุลาคม</option>
            <option value="11">พฤศจิกายน</option><option value="12">ธันวาคม</option>
        </select>
        
        <button class="btn-nav btn-kongpan" onclick="renderReport('กองพัน')">เวรกองพัน</button>
        <button class="btn-nav btn-spk" onclick="renderReport('ศปก.')">เวร ศปก.</button>
        <button class="btn-nav" onclick="window.print()">🖨️ ปริ้นท์</button>
        
        <button id="syncBtn" class="btn-nav btn-sync-google" onclick="syncAllToGoogle()">
            <i class="fab fa-google"></i> ซิงค์ Google Calendar
        </button>
    </div>
</div>

<div class="calendar-container no-print">
    <div class="calendar-grid">
        <div class="weekday">อาทิตย์</div><div class="weekday">จันทร์</div><div class="weekday">อังคาร</div>
        <div class="weekday">พุธ</div><div class="weekday">พฤหัสบดี</div><div class="weekday">ศุกร์</div><div class="weekday">เสาร์</div>
    </div>
    <div class="calendar-grid" id="calendarBody"></div>
</div>

<div id="dutyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle" style="margin:0">รายชื่อผู้เข้าเวร</h3>
            <span style="cursor:pointer; font-size:35px; line-height: 1;" onclick="closeModal()">&times;</span>
        </div>
        <div id="modalBody" class="modal-body">
            </div>
        <div style="padding:20px; text-align:right; border-top: 1px solid #eee;">
            <button class="btn-nav" style="background:#64748b; color:white; margin-left:auto" onclick="closeModal()">ปิดหน้าต่าง</button>
        </div>
    </div>
</div>

<script>
    let currentGroup = 'กองพัน';
    let fullData = {};

    async function renderReport(group) {
        currentGroup = group;
        const month = document.getElementById('monthSelect').value;
        const monthLabel = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        document.getElementById('subtext').innerText = `กลุ่มงาน: ${group} | ประจำเดือน ${monthLabel} 2569`;

        try {
            const resCal = await fetch(`/get-report-calendar?month=${month}&year=2026&group=${group}`);
            const dataCal = await resCal.json();

            fullData = {};
            dataCal.forEach(item => {
                const d = new Date(item.shift_date).getDate();
                if(!fullData[d]) fullData[d] = [];
                fullData[d].push(item);
            });

            const firstDay = new Date(2026, month - 1, 1).getDay();
            const daysInMonth = new Date(2026, month, 0).getDate();
            const body = document.getElementById('calendarBody');
            body.innerHTML = '';

            for (let i = 0; i < firstDay; i++) body.innerHTML += `<div></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                let html = `<span class="date-number">${d}</span>`;
                if(fullData[d]) {
                    // หา "นายทหารเวร" มาโชว์เป็นตัวหลัก
                    const boss = fullData[d].find(x => (x.role || "").includes("นายทหารเวร")) || fullData[d][0];
                    html += `<div class="badge-boss">⭐ ${boss.rank_name}</div>`;
                    if(fullData[d].length > 1) {
                        html += `<div class="badge-count">และอื่นๆ อีก ${fullData[d].length - 1} นาย</div>`;
                    }
                }
                body.innerHTML += `<div class="day-cell" onclick="openModal(${d})">${html}</div>`;
            }
        } catch (e) { console.error(e); }
    }

    function openModal(day) {
        const monthName = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        document.getElementById('modalTitle').innerText = `วันที่ ${day} ${monthName}`;
        const body = document.getElementById('modalBody');
        
        if (!fullData[day]) {
            body.innerHTML = '<p style="text-align:center; padding:30px;">ไม่มีข้อมูล</p>';
        } else {
            // 🚀 Logic: เรียงลำดับให้นายทหารเวรอยู่บนสุดเสมอ
            const sortedList = [...fullData[day]].sort((a, b) => {
                const isABoss = (a.role || "").includes("นายทหารเวร");
                const isBBoss = (b.role || "").includes("นายทหารเวร");
                return isBBoss - isABoss;
            });

            body.innerHTML = sortedList.map(d => `
                <div class="duty-item">
                    <div>
                        <b>${d.rank_name}</b><br>
                        <small style="color: ${ (d.role || "").includes("นายทหารเวร") ? 'var(--danger)' : '#64748b' }; font-weight: bold;">
                            ${d.role}
                        </small>
                    </div>
                    <button class="btn-del" onclick="deleteEntry(${d.id}, '${d.rank_name}', ${day})">
                        <i class="fas fa-trash-alt"></i> ลบ
                    </button>
                </div>
            `).join('');
        }
        document.getElementById('dutyModal').style.display = 'flex';
    }

    async function syncAllToGoogle() {
        const btn = document.getElementById('syncBtn');
        const month = document.getElementById('monthSelect').value;
        if(!confirm(`ซิงค์ข้อมูลกลุ่ม ${currentGroup} เข้า Google Calendar ใช่หรือไม่?`)) return;
        btn.innerHTML = "⏳ กำลังประมวลผล...";
        btn.disabled = true;
        try {
            const res = await fetch(`/sync-existing-shifts?month=${month}&year=2026&group=${currentGroup}`, { method: 'POST' });
            const result = await res.json();
            alert(`✅ ซิงค์สำเร็จ ${result.count} รายการ!`);
        } catch (err) { alert("เกิดข้อผิดพลาด"); }
        finally { btn.innerHTML = "<i class='fab fa-google'></i> ซิงค์ Google Calendar"; btn.disabled = false; }
    }

    async function deleteEntry(id, name, day) {
        if (confirm(`ต้องการลบชื่อ ${name} ออกจากเวรใช่หรือไม่?`)) {
            const res = await fetch(`/delete-shift/${id}`, { method: 'DELETE' });
            if (res.ok) { await renderReport(currentGroup); openModal(day); }
        }
    }

    function closeModal() { document.getElementById('dutyModal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('dutyModal')) closeModal(); }

    renderReport('กองพัน');
</script>
</body>
</html>
