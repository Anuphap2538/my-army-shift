<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duty Dashboard | ระบบสรุปเวรกองพัน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --glass: rgba(255, 255, 255, 0.8);
            --border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 20%; left: 10%;
            width: 300px; height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }

        .top-navigation {
            max-width: 1200px;
            margin: 0 auto 25px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 15px 30px;
            border-radius: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .brand-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 55px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .brand-text h1 { margin: 0; font-size: 24px; color: var(--primary); font-weight: 700; }
        .brand-text p { margin: 0; font-size: 13px; color: #64748b; }

        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        select, .btn-nav {
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .btn-sync-highlight {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 25px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-sync-highlight:hover {
            background: #059669;
            transform: scale(1.05);
        }

        /* Calendar Styling */
        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .weekday { padding: 10px; text-align: center; font-weight: 700; color: #94a3b8; font-size: 12px; }
        .day-cell {
            min-height: 120px;
            background: white;
            border-radius: 18px;
            padding: 12px;
            border: 1px solid #f1f5f9;
            transition: 0.3s;
            cursor: pointer;
        }
        .day-cell:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: var(--primary); }

        .date-number { font-size: 18px; font-weight: 700; color: #cbd5e1; }
        .badge-container { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
        .badge { font-size: 10px; padding: 3px 7px; border-radius: 6px; font-weight: 600; display: block; }
        .badge-boss { background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe; }
        .badge-count { background: #f8fafc; color: #64748b; }

        @media print {
            .no-print, body::before { display: none !important; }
            body { background: white; padding: 0; }
            .calendar-container { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<div class="top-navigation no-print">
    <div class="brand-area">
        <img src="images/air.png" alt="Logo" class="logo-img"> 
        <div class="brand-text">
            <h1>Duty Dashboard</h1>
            <p id="subtext">ระบบสรุปยอดเวรรายเดือน</p>
        </div>
    </div>

    <div class="controls-wrapper">
        <select id="monthSelect" onchange="renderReport(currentGroup)">
            <option value="3">มีนาคม</option>
            <option value="4">เมษายน</option>
        </select>
        
        <button class="btn-nav" onclick="renderReport('กองพัน')">เวรกองพัน</button>
        <button class="btn-nav" onclick="renderReport('ศปก.')">เวร ศปก.</button>
        <button class="btn-nav" onclick="window.print()">🖨️ ปริ้นท์</button>
        
        <button id="syncBtn" class="btn-nav btn-sync-highlight" onclick="syncAllToGoogle()">
            🔄 ซิงค์ข้อมูลเข้า Calendar
        </button>
    </div>
</div>

<div class="calendar-container no-print">
    <div class="calendar-grid">
        <div class="weekday">อา.</div><div class="weekday">จ.</div><div class="weekday">อ.</div>
        <div class="weekday">พ.</div><div class="weekday">พฤ.</div><div class="weekday">ศ.</div>
        <div class="weekday">ส.</div>
    </div>
    <div class="calendar-grid" id="calendarBody"></div>
</div>

<table id="printTable" style="display:none;">
    <tbody id="printTableBody"></tbody>
</table>

<script>
    let currentGroup = 'กองพัน';
    let fullData = {};

    async function syncAllToGoogle() {
        const btn = document.getElementById('syncBtn');
        const month = document.getElementById('monthSelect').value;
        const year = "2026";
        
        if(!confirm(`ยืนยันการซิงค์ข้อมูลเวร (${currentGroup}) เข้า Google Calendar?`)) return;
        
        btn.innerHTML = "⏳ กำลังซิงค์...";
        btn.disabled = true;

        try {
            const res = await fetch(`/sync-existing-shifts?month=${month}&year=${year}&group=${currentGroup}`, { method: 'POST' });
            const result = await res.text();
            alert(result);
        } catch (err) {
            alert("เกิดข้อผิดพลาด: " + err.message);
        } finally {
            btn.innerHTML = "🔄 ซิงค์ข้อมูลเข้า Calendar";
            btn.disabled = false;
        }
    }

    async function renderReport(group) {
        currentGroup = group;
        const month = document.getElementById('monthSelect').value;
        const monthName = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        
        document.getElementById('subtext').innerText = `กลุ่มงาน: ${group} | ประจำเดือน: ${monthName} 2569`;

        try {
            const [resCal, resSum] = await Promise.all([
                fetch(`/get-report-calendar?month=${month}&year=2026&group=${group}`),
                fetch(`/get-excel-summary?month=${month}&year=2026&group=${group}`)
            ]);

            const dataCal = await resCal.json();
            const dataSum = await resSum.json();

            // จัดกลุ่มข้อมูล
            fullData = {};
            dataCal.forEach(item => {
                const day = new Date(item.shift_date).getDate();
                if (!fullData[day]) fullData[day] = [];
                fullData[day].push(item);
            });

            // วาดปฏิทิน
            const firstDay = new Date(2026, month - 1, 1).getDay();
            const daysInMonth = new Date(2026, month, 0).getDate();
            const body = document.getElementById('calendarBody');
            body.innerHTML = '';

            // ช่องว่าง
            for (let i = 0; i < firstDay; i++) {
                body.innerHTML += `<div class="day-cell" style="background:transparent; border:none;"></div>`;
            }

            // วันที่มีข้อมูล
            for (let d = 1; d <= daysInMonth; d++) {
                let badges = '';
                if (fullData[d]) {
                    const boss = fullData[d].find(x => x.role.includes("นายทหารเวร"));
                    if (boss) badges += `<div class="badge badge-boss">⭐ ${boss.rank_name}</div>`;
                    badges += `<div class="badge badge-count">👥 เข้าเวร ${fullData[d].length} นาย</div>`;
                }

                body.innerHTML += `
                    <div class="day-cell">
                        <span class="date-number">${d}</span>
                        <div class="badge-container">${badges}</div>
                    </div>
                `;
            }

            // ตาราง Print
            const printBody = document.getElementById('printTableBody');
            printBody.innerHTML = dataSum.map(row => `
                <tr><td>${row.rank_name}</td><td>${row.role}</td><td>${row.days}</td></tr>
            `).join('');

        } catch (e) {
            console.error("Error loading calendar:", e);
        }
    }
    
    // เริ่มทำงาน
    renderReport('กองพัน');
</script>

</body>
</html>
