<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duty Dashboard | ระบบสรุปเวรกองพัน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;      /* แดง - กองพัน */
            --army-blue: #1e40af;   /* น้ำเงิน - ศปก. */
            --glass: rgba(255, 255, 255, 0.95);
            --border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0; padding: 15px; min-height: 100vh;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            background-attachment: fixed;
        }

        /* --- 📱 ส่วนควบคุมด้านบน (Top Navigation) --- */
        .top-navigation {
            max-width: 1200px; margin: 0 auto 20px auto;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 25px; border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .brand-area { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 50px; height: auto; }
        .brand-text h1 { margin: 0; font-size: 20px; color: var(--primary); font-weight: 700; }

        .controls-wrapper { 
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end;
        }

        #monthSelect {
            padding: 10px; width: 150px; border-radius: 12px; border: 1px solid #cbd5e1;
            font-family: inherit; font-weight: 600; cursor: pointer;
        }

        .btn-nav {
            padding: 10px 18px; border-radius: 12px; border: none;
            font-family: inherit; font-weight: 600; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-kongpan { background: var(--danger) !important; color: white; }
        .btn-spk { background: var(--army-blue) !important; color: white; }
        .btn-sync-google { 
            background: var(--success) !important; color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        /* --- 📅 ปฏิทิน --- */
        .calendar-container {
            max-width: 1200px; margin: 0 auto; background: var(--glass);
            border-radius: 25px; padding: 20px; border: 1px solid var(--border);
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .weekday { text-align: center; font-weight: 700; color: #64748b; font-size: 13px; padding: 10px 0; }
        
        .day-cell {
            min-height: 100px; background: white; border-radius: 15px; padding: 10px;
            border: 1px solid #f1f5f9; transition: 0.2s; cursor: pointer;
            display: flex; flex-direction: column; position: relative;
        }
        .day-cell:hover { transform: scale(1.02); border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .date-number { font-size: 15px; font-weight: 700; color: #cbd5e1; margin-bottom: 5px; }
        
        .badge-boss { 
            font-size: 10px; color: var(--primary); font-weight: 700; 
            background: #f0f3ff; padding: 4px; border-radius: 6px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
        }
        .badge-count { font-size: 9px; color: #94a3b8; margin-top: auto; }

        /* --- 🛠️ Responsive แก้เพี้ยนสำหรับมือถือ --- */
        @media (max-width: 768px) {
            .top-navigation { flex-direction: column; text-align: center; gap: 15px; }
            .brand-area { justify-content: center; }
            .controls-wrapper { 
                display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 8px;
            }
            #monthSelect { grid-column: span 2; width: 100%; }
            .btn-nav { justify-content: center; width: 100%; font-size: 13px; }
            .btn-sync-google { grid-column: span 2; padding: 15px; margin-top: 5px; }
            .day-cell { min-height: 75px; padding: 5px; }
            .badge-boss { font-size: 8.5px; }
        }

        /* --- Modal & Print --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 20px; overflow: hidden; }
        .modal-header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 15px; max-height: 350px; overflow-y: auto; }
        .duty-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .btn-del { color: var(--danger); background: #fff1f2; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; }

        @media print { .no-print { display: none !important; } #printTable { display: table !important; width: 100%; } }
    </style>
</head>
<body>

<div class="top-navigation no-print">
    <div class="brand-area">
        <img src="images/air.png" alt="Logo" class="logo-img"> 
        <div class="brand-text">
            <h1>Duty Dashboard</h1>
            <p id="subtext" style="margin:0; font-size:12px; color: #64748b;">กลุ่มงาน: กองพัน | มีนาคม 2569</p>
        </div>
    </div>

    <div class="controls-wrapper">
        <select id="monthSelect" onchange="renderReport(currentGroup)">
            <option value="1">มกราคม</option><option value="2">กุมภาพันธ์</option>
            <option value="3" selected>มีนาคม</option><option value="4">เมษายน</option>
            <option value="5">พฤษภาคม</option><option value="6">มิถุนายน</option>
            <option value="7">กรกฎาคม</option><option value="8">สิงหาคม</option>
            <option value="9">กันยายน</option><option value="10">ตุลาคม</option>
            <option value="11">พฤศจิกายน</option><option value="12">ธันวาคม</option>
        </select>
        
        <button class="btn-nav btn-kongpan" onclick="renderReport('กองพัน')">เวรกองพัน</button>
        <button class="btn-nav btn-spk" onclick="renderReport('ศปก.')">เวร ศปก.</button>
        <button class="btn-nav" onclick="window.print()">🖨️ ปริ้นท์</button>
        
        <button id="syncBtn" class="btn-nav btn-sync-google" onclick="syncAllToGoogle()">
            <i class="fab fa-google"></i> ซิงค์ Google Calendar
        </button>
    </div>
</div>

<div class="calendar-container no-print">
    <div class="calendar-grid">
        <div class="weekday">อา.</div><div class="weekday">จ.</div><div class="weekday">อ.</div>
        <div class="weekday">พ.</div><div class="weekday">พฤ.</div><div class="weekday">ศ.</div><div class="weekday">ส.</div>
    </div>
    <div class="calendar-grid" id="calendarBody"></div>
</div>

<div id="dutyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle" style="margin:0; font-size: 18px;">รายชื่อผู้เข้าเวร</h3>
            <span style="cursor:pointer; font-size:28px;" onclick="closeModal()">&times;</span>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div style="padding:15px; text-align:right; border-top: 1px solid #eee;">
            <button class="btn-nav" style="background:#eee; margin-left:auto" onclick="closeModal()">ปิด</button>
        </div>
    </div>
</div>

<table id="printTable" style="display:none; border-collapse: collapse; width: 100%;">
    <thead>
        <tr style="background: #eee;">
            <th style="border:1px solid #000; padding:8px;">ยศ ชื่อ - สกุล</th>
            <th style="border:1px solid #000; padding:8px;">หน้าที่</th>
            <th style="border:1px solid #000; padding:8px;">จำนวนวัน (วันที่)</th>
        </tr>
    </thead>
    <tbody id="printTableBody"></tbody>
</table>

<script>
    let currentGroup = 'กองพัน';
    let fullData = {};

    async function syncAllToGoogle() {
        const btn = document.getElementById('syncBtn');
        const month = document.getElementById('monthSelect').value;
        if(!confirm(`ต้องการส่งตารางเวรกลุ่ม ${currentGroup} เข้า Google Calendar ของทุกคนที่มี ✅ ใช่หรือไม่?`)) return;
        
        btn.innerHTML = "⏳ กำลังซิงค์...";
        btn.disabled = true;

        try {
            const res = await fetch(`/sync-existing-shifts?month=${month}&year=2026&group=${currentGroup}`, { method: 'POST' });
            const result = await res.json();
            alert(`✅ ซิงค์สำเร็จ! ${result.count} รายการ\nระบบตั้งแจ้งเตือน 07:00 น. ในวันเข้าเวรให้ทุกคนแล้ว`);
        } catch (err) {
            alert("❌ เกิดข้อผิดพลาด: " + err.message);
        } finally {
            btn.innerHTML = "<i class='fab fa-google'></i> ซิงค์ Google Calendar";
            btn.disabled = false;
        }
    }

    async function renderReport(group) {
        currentGroup = group;
        const month = document.getElementById('monthSelect').value;
        const monthLabel = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        document.getElementById('subtext').innerText = `กลุ่มงาน: ${group} | ${monthLabel} 2569`;

        try {
            const [resCal, resSum] = await Promise.all([
                fetch(`/get-report-calendar?month=${month}&year=2026&group=${group}`),
                fetch(`/get-excel-summary?month=${month}&year=2026&group=${group}`)
            ]);
            const dataCal = await resCal.json();
            const dataSum = await resSum.json();

            fullData = {};
            dataCal.forEach(item => {
                const d = new Date(item.shift_date).getDate();
                if(!fullData[d]) fullData[d] = [];
                fullData[d].push(item);
            });

            const firstDay = new Date(2026, month - 1, 1).getDay();
            const daysInMonth = new Date(2026, month, 0).getDate();
            const body = document.getElementById('calendarBody');
            body.innerHTML = '';

            for (let i = 0; i < firstDay; i++) body.innerHTML += `<div></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                let html = `<span class="date-number">${d}</span>`;
                if(fullData[d]) {
                    const boss = fullData[d].find(x => (x.role || "").includes("นายทหารเวร")) || fullData[d][0];
                    html += `<div class="badge-boss">⭐ ${boss.rank_name}</div>`;
                    html += `<div class="badge-count">👥 ${fullData[d].length} นาย</div>`;
                }
                body.innerHTML += `<div class="day-cell" onclick="openModal(${d})">${html}</div>`;
            }

            document.getElementById('printTableBody').innerHTML = dataSum.map(row => 
                `<tr><td style="border:1px solid #000; padding:8px;">${row.rank_name}</td><td style="border:1px solid #000; padding:8px;">${row.role}</td><td style="border:1px solid #000; padding:8px;">${row.days}</td></tr>`
            ).join('');

        } catch (e) { console.error(e); }
    }

    function openModal(day) {
        const monthName = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        document.getElementById('modalTitle').innerText = `วันที่ ${day} ${monthName}`;
        const body = document.getElementById('modalBody');
        
        if (!fullData[day]) {
            body.innerHTML = '<p style="text-align:center; color:gray; padding:20px;">ไม่มีข้อมูลการเข้าเวร</p>';
        } else {
            body.innerHTML = fullData[day].map(d => `
                <div class="duty-item">
                    <div><b>${d.rank_name}</b><br><small style="color: #666;">${d.role}</small></div>
                    <button class="btn-del" onclick="deleteEntry(${d.id}, '${d.rank_name}', ${day})">ลบ</button>
                </div>
            `).join('');
        }
        document.getElementById('dutyModal').style.display = 'flex';
    }

    async function deleteEntry(id, name, day) {
        if (confirm(`ยืนยันการลบเวรของ ${name}?`)) {
            const res = await fetch(`/delete-shift/${id}`, { method: 'DELETE' });
            if (res.ok) { 
                await renderReport(currentGroup); 
                fullData[day] && fullData[day].length > 1 ? openModal(day) : closeModal();
            }
        }
    }

    function closeModal() { document.getElementById('dutyModal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('dutyModal')) closeModal(); }

    renderReport('กองพัน');
</script>
</body>
</html>
