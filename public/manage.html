<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการเวร | จัดการเข้าเวร</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4f46e5">
   <style>
    :root {
        --primary: #3b82f6;
        --primary-dark: #1e40af;
        --success: #10b981;
        --danger: #ef4444;
        /* ปรับให้ขาวจางๆ เห็นพื้นหลัง (0.4) */
        --glass: rgba(255, 255, 255, 0.4); 
        --border: rgba(255, 255, 255, 0.2);
    }

    body {
        font-family: 'Sarabun', sans-serif;
        margin: 0; padding: 20px; min-height: 100vh;
        /* ดึงรูป pa.jpg มาใช้ และลดความเข้มสีทับหน้าลงเหลือ 0.3 */
        background-image: linear-gradient(rgba(241, 245, 249, 0.3), rgba(241, 245, 249, 0.3)), 
                          url('images/pa.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;
    }

    /* ทำ Effect เบลอพื้นหลังให้ดูนุ่มนวล */
    body::before {
        content: "";
        position: fixed; inset: 0;
        background: inherit;
        filter: blur(5px); /* ลดความเบลอลงเพื่อให้เห็นภาพชัดขึ้น */
        z-index: -1;
    }

    /* ปรับแต่ง Container ให้เป็นกระจกใสๆ (Glassmorphism) */
    .container {
        max-width: 1000px; 
        margin: 0 auto; 
        background: var(--glass);
        backdrop-filter: blur(10px); 
        -webkit-backdrop-filter: blur(10px);
        border-radius: 25px; 
        padding: 30px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* ส่วนอื่นๆ เช่น Header ให้ปรับตามความสวยงาม */
    .header {
        background: var(--primary);
        color: white;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 25px;
        text-align: center;
    }

    /* ปรับตารางให้โปร่งแสงนิดๆ ด้วยจะสวยมาก */
    table {
        width: 100%;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 10px;
        overflow: hidden;
    }
    
    /* แบ่งฝั่งซ้าย (350px) และ ฝั่งขวา (ที่เหลือ) */
    .app-container { 
        max-width: 1400px; 
        margin: auto; 
        display: grid; 
        grid-template-columns: 350px 1fr; 
        gap: 20px; 
    }
    
    .sidebar { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: fit-content; }
    .main-content { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

    /* คุมขนาดปุ่มทุกปุ่มใน Sidebar ให้เท่ากันเป๊ะ */
    .btn-side { 
        width: 100%; 
        padding: 12px; 
        border: none; 
        border-radius: 10px; 
        font-weight: 600; 
        cursor: pointer; 
        margin-bottom: 10px; 
        font-family: inherit;
        transition: 0.3s;
    }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
    select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-family: inherit; }
</style>

<div class="app-container">
    <div class="sidebar">
        <h2 style="color:var(--primary); margin-top:0;">📋 ลงข้อมูลเวร</h2>
        
        <div class="form-group">
            <label>1. เลือกหน้าที่ (Role)</label>
            <select id="roleFilter" onchange="updateSelection()"></select>
        </div>

        <div id="shiftSection" class="form-group" style="display:none; background:#eef2ff; padding:15px; border-radius:10px; border:1px solid #2563eb;">
            <label style="color: #2563eb;">🕒 เลือกผลัดที่จะลง</label>
            <select id="workShift">
                <option value="1">ผลัด 1</option><option value="2">ผลัด 2</option><option value="3">ผลัด 3</option>
            </select>
        </div>

        <div class="form-group">
            <label>2. รายชื่อกำลังพล</label>
            <select id="userSelect"></select>
        </div>

        <div class="form-group">
            <label>3. สังกัด/กลุ่มงาน</label>
            <select id="groupFilter">
                <option value="กองพัน">กองพัน</option><option value="ศปก.">ศปก.</option>
            </select>
        </div>

        <button class="btn-side" style="background: var(--primary); color: white;" onclick="saveShift()">💾 บันทึกการจัดเวร</button>
        <button class="btn-side" style="background: #facc15; color: #1e293b;" onclick="location.href='/'">🏠 กลับหน้าหลัก</button>
        
        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
            <button class="btn-side" style="background: #f97316; color: white;" onclick="clearAllShifts()">⚠️ ล้างข้อมูลเวร (ปฏิทิน)</button>
            <button class="btn-side" style="background: #ef4444; color: white;" onclick="clearAllUsers()">🗑️ ล้างรายชื่อทหาร (Excel)</button>
        </div>
    </div>

    <div class="main-content">
        <div id="calendar"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<script>
    let allUsers = [];
    let selectedData = {}; // เก็บข้อมูล { "วันที่": "ผลัด" }
    let calendar;

    document.addEventListener('DOMContentLoaded', async () => {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'th',
            selectable: true,
            headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
            select: function(info) {
                const date = info.startStr;
                const role = document.getElementById('roleFilter').value;
                const currentShift = document.getElementById('workShift').value;
                const cell = document.querySelector(`[data-date="${date}"]`);

                if(selectedData[date]) {
                    delete selectedData[date];
                    if (cell) {
                        cell.style.setProperty('background-color', '', 'important');
                        const label = cell.querySelector('.shift-label');
                        if(label) label.remove();
                    }
                } else {
                    // ถ้าเป็นวิทยุ ให้ใช้ค่าจากช่องเลือกผลัด ถ้าไม่ใช่ให้เป็น 1
                    const shiftValue = role.includes("วิทยุ") ? currentShift : "1";
                    selectedData[date] = shiftValue;
                    
                    if (cell) {
                        cell.style.setProperty('background-color', '#dbeafe', 'important');
                        const shiftText = role.includes("วิทยุ") ? ` (ผ.${shiftValue})` : "";
                        cell.insertAdjacentHTML('beforeend', `<div class="shift-label" style="font-size:11px; font-weight:bold; color:blue; padding:2px; pointer-events:none;">📍 เลือก${shiftText}</div>`);
                    }
                }
                calendar.unselect();
            }
        });
        calendar.render();

        try {
            const res = await fetch('/get-users');
            allUsers = await res.json();
            const roleSelect = document.getElementById('roleFilter');
            const uniqueRoles = [...new Set(allUsers.map(u => u.role.trim()))];
            roleSelect.innerHTML = '<option value="">-- เลือกหน้าที่ --</option>';
            uniqueRoles.sort().forEach(r => {
                if(r) roleSelect.innerHTML += `<option value="${r}">${r}</option>`;
            });
        } catch (e) { console.error("โหลดข้อมูลล้มเหลว"); }
    });

    function updateSelection() {
        const role = document.getElementById('roleFilter').value;
        const userSelect = document.getElementById('userSelect');
        const shiftSection = document.getElementById('shiftSection');
        userSelect.innerHTML = '<option value="">-- เลือกชื่อคน --</option>';
        
        // โชว์ช่องเลือกผลัดเฉพาะวิทยุ
        shiftSection.style.display = role.includes("วิทยุ") ? 'block' : 'none';

        const filtered = allUsers.filter(u => u.role.trim() === role.trim());
        filtered.forEach(u => {
            userSelect.innerHTML += `<option value="${u.id}">${u.rank_name}</option>`;
        });
    }

    async function saveShift() {
        const userId = document.getElementById('userSelect').value;
        const roleType = document.getElementById('roleFilter').value;
        const groupName = document.getElementById('groupFilter').value;
        const dates = Object.keys(selectedData);

        if (!userId || dates.length === 0) {
            alert("กรุณาเลือกรายชื่อและวันที่บนปฏิทินก่อนครับ");
            return;
        }

        let success = 0;
        for (const date of dates) {
            const payload = {
                user_id: userId,
                shift_date: date,
                role_type: roleType,
                group_name: groupName,
                shift_turn: selectedData[date],
                note: ""
            };

            try {
                const res = await fetch('/assign-shift', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) success++;
            } catch (err) { console.error(err); }
        }

        if (success > 0) {
            alert(`✅ บันทึกสำเร็จ ${success} รายการ`);
            location.reload();
        } else {
            alert("❌ บันทึกไม่สำเร็จ เช็คจอดำ (Terminal)");
        }
    }

    async function clearAllShifts() {
    if (!confirm("⚠️ ยืนยันการลบข้อมูลเวรทั้งหมด? (รายชื่อคนจะยังอยู่ แต่ตารางเวรจะว่างเปล่า)")) return;
    
    try {
        // เปลี่ยนจาก fetch เฉยๆ เป็นระบุ method: 'DELETE'
        const res = await fetch('/clear-shifts', { method: 'DELETE' });
        const msg = await res.text();
        if (res.ok) {
            alert(msg);
            location.reload();
        } else {
            alert("❌ " + msg);
        }
    } catch (err) { 
        alert("❌ ไม่สามารถเชื่อมต่อกับ Server ได้"); 
    }
}

    // ฟังก์ชันล้างรายชื่อ (ปุ่มแดง)
async function clearAllUsers() {
    if (!confirm("🚨 ยืนยันลบรายชื่อทหารทั้งหมด?")) return;
    try {
        const res = await fetch('/clear-all-users'); // เรียกปกติแบบ GET
        if (res.ok) {
            alert("✅ ล้างข้อมูลเรียบร้อย!");
            location.reload();
        }
    } catch (err) { alert("❌ ลบไม่สำเร็จ"); }
}

async function clearAllShifts() {
    if (!confirm("⚠️ ยืนยันล้างปฏิทิน?")) return;
    try {
        const res = await fetch('/clear-shifts'); // เรียกปกติแบบ GET
        if (res.ok) {
            alert("✅ ล้างปฏิทินเรียบร้อย!");
            location.reload();
        }
    } catch (err) { alert("❌ ลบไม่สำเร็จ"); }
}

// ฟังก์ชันล้างเวร (ปุ่มส้ม) - ตัวที่เพื่อนบอกว่าใช้ได้แล้วแต่เช็ค Method อีกทีให้ชัวร์
async function clearAllShifts() {
    if (!confirm("⚠️ ยืนยันการลบข้อมูลบนปฏิทินทั้งหมด?\n(รายชื่อคนจะยังอยู่เหมือนเดิม)")) return;
    
    try {
        const res = await fetch('/clear-shifts', { method: 'DELETE' });
        if (res.ok) {
            alert("✅ ล้างปฏิทินเวรเรียบร้อยแล้ว!");
            location.reload();
        } else {
            alert("❌ ลบข้อมูลไม่สำเร็จ");
        }
    } catch (err) { 
        alert("❌ ผิดพลาดในการเชื่อมต่อ"); 
    }
}
</script>
</body>

</html>
