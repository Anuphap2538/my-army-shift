<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นำเข้าข้อมูลรายชื่อ - กองพันทหารอากาศโยธิน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --primary-dark: #1e40af; --glass: rgba(255, 255, 255, 0.4); }
        body {
            font-family: 'Sarabun', sans-serif; margin: 0; padding: 20px; min-height: 100vh;
            background-image: linear-gradient(rgba(241, 245, 249, 0.3), rgba(241, 245, 249, 0.3)), url('images/pa.jpg');
            background-size: cover; background-position: center; background-attachment: fixed; position: relative;
        }
        body::before { content: ""; position: fixed; inset: 0; background: inherit; filter: blur(5px); z-index: -1; }
        .container {
            max-width: 600px; margin: 60px auto; background: var(--glass); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border-radius: 25px; padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary-dark); font-size: 24px; margin: 10px 0; }
        .upload-area {
            border: 3px dashed var(--primary); border-radius: 20px; padding: 30px;
            text-align: center; background: rgba(255, 255, 255, 0.6); cursor: pointer; transition: 0.3s;
        }
        .upload-area:hover { background: rgba(255, 255, 255, 0.9); border-color: var(--primary-dark); }
        .upload-area i { font-size: 45px; color: var(--primary); margin-bottom: 10px; }
        .btn-group { display: flex; gap: 15px; margin-top: 25px; justify-content: center; }
        .btn {
            padding: 12px 25px; border-radius: 12px; border: none; font-weight: 700;
            cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-back { background: #64748b; color: white; text-decoration: none; }
        #fileInfo { margin-top: 15px; font-weight: 600; color: #059669; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="images/air.png" alt="Logo" style="width: 70px;">
        <h1>นำเข้ารายชื่อกำลังพล</h1>
        <p>อัปโหลดไฟล์ Excel เพื่อบันทึกลง TiDB Cloud</p>
    </div>

    <div class="upload-area" onclick="document.getElementById('excelFile').click()">
        <i class="fas fa-file-excel"></i>
        <p id="promptText">คลิกเพื่อเลือกไฟล์ Excel รายชื่อ</p>
        <input type="file" id="excelFile" hidden accept=".xlsx, .xls" onchange="handleFile(this)">
        <div id="fileInfo"></div>
    </div>

    <div class="btn-group">
        <a href="/" class="btn btn-back"><i class="fas fa-home"></i> หน้าหลัก</a>
        <button type="button" class="btn btn-primary" onclick="uploadData()" id="uploadBtn">
            <i class="fas fa-cloud-upload-alt"></i> บันทึกลง TiDB
        </button>
    </div>
</div>

<script>
    let jsonData = [];

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            document.getElementById('promptText').style.display = 'none';
            document.getElementById('fileInfo').innerText = `✅ เลือกไฟล์แล้ว: ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                console.log("อ่านข้อมูลสำเร็จ:", jsonData);
            };
            reader.readAsArrayBuffer(file);
        }
    }

    async function uploadData() {
        if (jsonData.length === 0) {
            alert("กรุณาเลือกไฟล์และรอให้ระบบอ่านข้อมูลก่อนครับ");
            return;
        }

        const btn = document.getElementById('uploadBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';

        try {
            // 🎯 เรียกไปที่ API /import-users ตามโค้ด JS ของเพื่อนเป๊ะๆ
            const response = await fetch('/import-users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ users: jsonData })
            });

            const result = await response.text();
            if (response.ok) {
                alert(result);
                window.location.href = '/';
            } else {
                alert("เกิดข้อผิดพลาด: " + result);
            }
        } catch (err) {
            alert("เชื่อมต่อ Server ไม่ได้: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> บันทึกลง TiDB';
        }
    }
</script>

<script>
(async function checkAdmin() {
  try {
    const res = await fetch("/admin/check", { cache: "no-store" });
    if (!res.ok) {
      window.location.href = "/admin-login.html";
    }
  } catch (e) {
    window.location.href = "/admin-login.html";
  }
})();
</script>

</body>
</html>
