<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบนำเข้าข้อมูลกำลังพล | Cloud Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 450px; }
        .icon-box { font-size: 50px; margin-bottom: 20px; }
        .drop-zone { border: 2px dashed #2563eb; padding: 40px 20px; border-radius: 15px; background: #f8faff; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .drop-zone:hover { background: #eef2ff; border-color: #1d4ed8; }
        .btn-upload { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-upload:disabled { background: #cbd5e1; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }
        .nav-link { margin-top: 20px; display: block; color: #64748b; text-decoration: none; font-size: 14px; }
        .nav-link:hover { color: #2563eb; }
        small { color: #64748b; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box">🎖️</div>
    <h2>นำเข้าข้อมูลกำลังพล</h2>
    <p style="color: #64748b; margin-bottom: 25px;">
        อัปโหลดไฟล์ Excel หรือ CSV เพื่อบันทึกรายชื่อ <br>
        <small>*หัวตารางต้องมี: <b>ยศ - ชื่อ, หน้าที่, email</b></small>
    </p>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="dropZoneText">📁 คลิกเพื่อเลือกไฟล์ Excel หรือ CSV</span>
        <input type="file" id="fileInput" hidden accept=".xlsx, .xls, .csv">
    </div>

    <div id="status"></div>

    <button id="uploadBtn" class="btn-upload" onclick="processAndSend()" disabled>🚀 เริ่มนำเข้าข้อมูลขึ้น Cloud</button>

    <a href="/manage.html" class="nav-link">ไปหน้าจัดการเวร →</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    let preparedData = [];

    // เมื่อเลือกไฟล์
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('dropZoneText').innerText = "📄 เลือกไฟล์แล้ว: " + file.name;
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('uploadBtn');

        if (file.name.endsWith('.csv')) {
            // อ่านไฟล์ CSV
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    preparedData = results.data;
                    showReadyStatus(preparedData.length);
                }
            });
        } else {
            // อ่านไฟล์ Excel
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                preparedData = XLSX.utils.sheet_to_json(firstSheet);
                showReadyStatus(preparedData.length);
            };
            reader.readAsArrayBuffer(file);
        }
    });

    function showReadyStatus(count) {
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('uploadBtn');
        statusDiv.innerHTML = `<span style="color: #059669;">✅ พบข้อมูล ${count} รายการ พร้อมนำเข้า</span>`;
        btn.disabled = false;
    }

    // ส่งข้อมูลไปที่ server.js
    async function processAndSend() {
        const btn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('status');
        
        btn.innerText = "⏳ กำลังบันทึกลง Cloud...";
        btn.disabled = true;

        try {
            // ส่งข้อมูลไปที่ API /import-users (ต้องตรงกับใน server.js)
            const response = await fetch('/import-users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ users: preparedData })
            });

            const result = await response.text();

            if (response.ok) {
                statusDiv.innerHTML = `<span style="color: #2563eb;">🎉 ${result}</span>`;
                btn.innerText = "เสร็จสมบูรณ์ ✅";
                setTimeout(() => { location.reload(); }, 2000);
            } else {
                throw new Error(result);
            }
        } catch (err) {
            statusDiv.innerHTML = `<span style="color: #ef4444;">❌ ผิดพลาด: ${err.message}</span>`;
            btn.innerText = "ลองใหม่อีกครั้ง";
            btn.disabled = false;
        }
    }
    
</script>

</body>
</html>
